<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TikTok LIVE Horse Race</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;

    overflow-y:auto;
    overflow-x:hidden;

    font-family:Arial, sans-serif;

    background:url('images/background.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    position:relative;
}

/* DARK OVERLAY */

body::before{
    content:'';
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.55);

    z-index:0;
}

.container{
    position:relative;
    z-index:2;

    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;

    gap:25px;

    padding:30px;
}

.title{
    text-align:center;
    color:white;

    font-size:60px;
    font-weight:bold;

    text-shadow:
    0 0 10px #fff,
    0 0 20px #ff00ff,
    0 0 40px #ff00ff;

    margin-bottom:30px;

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.03);
    }

    100%{
        transform:scale(1);
    }

}
#leaderboard{

    display:flex;

    justify-content:center;

    gap:20px;

    margin-bottom:20px;

    flex-wrap:wrap;
}

.leader{

    background:rgba(0,0,0,0.5);

    border:2px solid gold;

    padding:10px 20px;

    border-radius:15px;

    color:white;

    font-size:24px;
    font-weight:bold;

    box-shadow:
    0 0 10px gold;
}
/* TRACK */

.track{
    position:relative;

    width:100%;
    height:80px;

    border-radius:25px;

    overflow:hidden;

    border:3px solid rgba(255,255,255,0.3);

    backdrop-filter:blur(6px);

    background:
    repeating-linear-gradient(
        90deg,
        #222 0px,
        #222 40px,
        #333 40px,
        #333 80px
    );

    animation:moveTrack 1s linear infinite;

    box-shadow:
    0 0 15px rgba(255,255,255,0.2),
    inset 0 0 20px rgba(0,0,0,0.8);
}

@keyframes moveTrack{

    from{
        background-position:0 0;
    }

    to{
        background-position:-80px 0;
    }

}

/* FINISH LINE */

.finish{
    position:absolute;

    right:0;
    top:0;

    width:15px;
    height:100%;

    background:
    repeating-linear-gradient(
        white 0px,
        white 20px,
        black 20px,
        black 40px
    );

    z-index:5;
}

/* HORSE */

.horse{
    position:absolute;

    left:0;
    top:15px;

    transition:left .25s linear;

    z-index:10;
}
    
.horse img{
    width:60px;

    filter:
    drop-shadow(0 0 15px gold)
    drop-shadow(0 0 25px orange);
}
/* LABEL */

.label{

    position:absolute;

    left:85px;
    top:50%;

    transform:translateY(-50%);

   font-family:'Orbitron', sans-serif;

    font-size:20px;
    font-weight:900;

    letter-spacing:2px;

    text-transform:uppercase;

    background:linear-gradient(
        90deg,
        #ffe600,
        #ff9900,
        #ff3c00
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 8px rgba(255,255,255,0.4),
    0 0 15px rgba(255,150,0,0.8),
    0 0 25px rgba(255,100,0,0.7);

    z-index:20;

}
.giftIcon{
.raceRow{

    display:flex;

    align-items:center;

    gap:15px;

    width:100%;

}

.giftOutside{

    min-width:60px;
    width:60px;

    height:60px;

    display:flex;

    align-items:center;
    justify-content:center;

    font-size:42px;

    background:rgba(0,0,0,0.45);

    border:2px solid rgba(255,255,255,0.2);

    border-radius:18px;

    backdrop-filter:blur(5px);

    box-shadow:
    0 0 10px rgba(255,215,0,0.5);

    flex-shrink:0;

}
/* RUNNING TEXT */

.banner{
    position:absolute;

    top:55px;
    left:100%;

    white-space:nowrap;

    font-size:22px;
    font-weight:bold;

    color:#00ffea;

    text-shadow:
    0 0 10px #00ffea,
    0 0 20px #00ffea;

    animation:bannerMove 7s linear infinite;

    z-index:20;
}

@keyframes bannerMove{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-115vw);
    }

}

/* WINNER SCREEN */

#winnerPopup{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.8);

    display:none;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    z-index:999;
}

#winnerPopup h1{
    color:white;

    font-size:100px;

    text-shadow:
    0 0 20px gold,
    0 0 40px gold;

    animation:pulse 1s infinite;
}

/* MOBILE */

@media(max-width:768px){

    .title{
        font-size:32px;
    }

    .track{
        height:120px;
    }

    .horse img{
        width:90px;
    }

    .label{
        font-size:20px;
    }

    .banner{
        font-size:16px;
        top:80px;
    }

    #winnerPopup h1{
        font-size:48px;
        text-align:center;
        padding:20px;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="title">
🏆 CURSA TIKTOK 🏆
</div>

    <div id="leaderboard">

<div class="leader">
🥇 <span id="firstPlace">ROMANIA - 0</span>
</div>

<div class="leader">
🥈 <span id="secondPlace">ITALY - 0</span>
</div>

<div class="leader">
🥉 <span id="thirdPlace">FRANCE - 0</span>
</div>

</div>
<!-- ROMANIA -->

<!-- TRACK 1 -->

<div class="raceRow">

    <div class="giftOutside">
        🌹
    </div>

    <div class="track">

        <div class="finish"></div>

        <div class="label">Ilie Bolojan</div>

        <div class="banner">
            Ilie Bolojan
        </div>

        <div class="horse" id="track1Horse">
            <img src="horse.gif">
        </div>

    </div>

</div>

<!-- TRACK 2 -->

<div class="raceRow">

    <div class="giftOutside">
        🎮
    </div>

    <div class="track">

        <div class="finish"></div>

        <div class="label">Nicușor Dan</div>

        <div class="banner">
            Nicușor Dan
        </div>

        <div class="horse" id="track2Horse">
            <img src="horse.gif">
        </div>

    </div>

</div>

<!-- TRACK 3 -->

<div class="raceRow">

    <div class="giftOutside">
        🎵
    </div>

    <div class="track">

        <div class="finish"></div>

        <div class="label">George Simion</div>

        <div class="banner">
            George Simion
        </div>

        <div class="horse" id="track3Horse">
            <img src="horse.gif">
        </div>

    </div>

</div>

<!-- TRACK 4 -->

<div class="raceRow">

    <div class="giftOutside">
        ☕
    </div>

    <div class="track">

        <div class="finish"></div>

        <div class="label">Călin Georgescu</div>

        <div class="banner">
            Călin Georgescu
        </div>

        <div class="horse" id="track4Horse">
            <img src="horse.gif">
        </div>

    </div>

</div> 
</div>

<!-- WINNER -->

<script>

const socket = io();

const horses = {

    track1:document.getElementById('track1Horse'),
    track2:document.getElementById('track2Horse'),
    track3:document.getElementById('track3Horse'),
    track4:document.getElementById('track4Horse')

};
const scores = {

    track1:0,
    track2:0,
    track3:0,
    track4:0

};
socket.on('updateRace', data => {

horses.track1.style.left = data.track1 + 'px';
horses.track2.style.left = data.track2 + 'px';
horses.track3.style.left = data.track3 + 'px';
horses.track4.style.left = data.track4 + 'px';

    checkWinner(data);

});

function checkWinner(data){

    for(const horse in data){

        if(data[horse] >= 1400){

            scores[horse]++;

            data[horse] = 0;

            horses[horse].style.left = '0px';

            updateLeaderboard();

        }

    }

}
function updateLeaderboard(){

    const sorted = Object.entries(scores)
    .sort((a,b)=>b[1]-a[1]);

    document.getElementById('firstPlace').innerHTML =
    sorted[0][0].toUpperCase() + ' - ' + sorted[0][1];

    document.getElementById('secondPlace').innerHTML =
    sorted[1][0].toUpperCase() + ' - ' + sorted[1][1];

    document.getElementById('thirdPlace').innerHTML =
    sorted[2][0].toUpperCase() + ' - ' + sorted[2][1];

}
</script>

</body>
</html>
