<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TikTok LIVE Horse Race</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
    
html, body{
    width:100%;
    min-height:100%;
    margin:0;
    padding:0;
    overflow-x:hidden;
    touch-action:manipulation;
}
body{

    width:100%;
    min-height:100dvh;

    overflow-y:auto;
    overflow-x:hidden;

    font-family:Arial, sans-serif;

    background:

    radial-gradient(
        circle at top,
        rgba(255,180,0,0.25),
        rgba(0,0,0,0.75)
    ),

    linear-gradient(
        rgba(0,0,0,0.35),
        rgba(0,0,0,0.55)
    ),

    url('images/stadium.jpg');

    background-size:cover;

    background-position:center;

    background-attachment:fixed;

    position:relative;

}

/* DARK OVERLAY */


.container{
    position:relative;
    z-index:2;

    width:100%;
    min-height:100dvh;

    display:flex;
    flex-direction:column;
   justify-content:flex-start;

gap:10px;
padding:8px;
    backdrop-filter:blur(2px);
}

.title{

    text-align:center;

    font-size:30px;

    font-family:'Orbitron', sans-serif;

    font-weight:900;

    color:white;

    letter-spacing:4px;

    text-shadow:
    0 0 10px #fff,
    0 0 20px #ff00ff,
    0 0 40px #00e5ff,
    0 0 60px #ff00ff;

    animation:pulse 2s infinite;

}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.03);
    }

    100%{
        transform:scale(1);
    }

}
#leaderboard{

    display:flex;

    justify-content:center;

    gap:20px;

    margin-bottom:20px;

    flex-wrap:wrap;
}

.leader{

    background:rgba(0,0,0,0.5);

    border:2px solid gold;

    padding:10px 20px;

    border-radius:15px;

    color:white;

    font-size:24px;
    font-weight:bold;

    box-shadow:
    0 0 10px gold;

    transition:.3s;
}
/* TRACK */
.leader:hover{

    transform:scale(1.05);

    box-shadow:
    0 0 20px gold;

}
.track{

    position:relative;

    flex:1;

    height:80px;

    border-radius:25px;

    overflow:hidden;

    border:3px solid rgba(255,255,255,0.25);

    background:

    repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.05) 0px,
        rgba(255,255,255,0.05) 80px,
        transparent 80px,
        transparent 160px
    ),

    linear-gradient(
        180deg,
        #5b3a1e 0%,
        #7a4b24 50%,
        #4a2d15 100%
    );

    box-shadow:
    0 0 20px rgba(255,170,0,0.25),
    inset 0 0 25px rgba(0,0,0,0.7);

}

    .track::after{

    content:'';

    position:absolute;

    left:0;
    bottom:0;

    width:100%;
    height:10px;

    background:
    repeating-linear-gradient(
        90deg,
        #00ff66,
        #00cc55 10px,
        #00aa44 20px
    );

    opacity:.7;

}
@keyframes moveTrack{

    from{
        background-position:0 0;
    }

    to{
        background-position:-80px 0;
    }

}

/* FINISH LINE */

.finish{
    position:absolute;

    right:0;
    top:0;

    width:15px;
    height:100%;

    background:
    repeating-linear-gradient(
        white 0px,
        white 20px,
        black 20px,
        black 40px
    );

    z-index:5;
}

/* HORSE */

.horse{
    position:absolute;

 left:10px;
    top:15px;

    transition:left .25s linear;

    z-index:10;
}
    
.horse img{
    width:60px;

    filter:
    drop-shadow(0 0 15px gold)
    drop-shadow(0 0 25px orange);
}
/* LABEL */

.label{

    position:absolute;

    left:85px;
    top:50%;

    transform:translateY(-50%);

   font-family:'Orbitron', sans-serif;

    font-size:20px;
    font-weight:900;

    letter-spacing:2px;

    text-transform:uppercase;

    background:linear-gradient(
        90deg,
        #ffe600,
        #ff9900,
        #ff3c00
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 8px rgba(255,255,255,0.4),
    0 0 15px rgba(255,150,0,0.8),
    0 0 25px rgba(255,100,0,0.7);

    z-index:20;

}
.raceRow{

    display:flex;

    align-items:center;

    gap:15px;

    width:100%;

}

.giftOutside{

    min-width:60px;
    width:60px;

    height:60px;

    display:flex;

    align-items:center;
    justify-content:center;

    font-size:42px;

    background:rgba(0,0,0,0.45);

    border:2px solid rgba(255,255,255,0.2);

    border-radius:18px;

    backdrop-filter:blur(5px);

    box-shadow:
    0 0 10px rgba(255,215,0,0.5);

    flex-shrink:0;

}
/* RUNNING TEXT */
.giftImg{

    width:80%;

    height:80%;

    object-fit:contain;

    filter:
    drop-shadow(0 0 10px rgba(255,255,255,0.6));

}
.banner{
    position:absolute;

    top:55px;
    left:100%;

    white-space:nowrap;

    font-size:22px;
    font-weight:bold;

    color:#00ffea;

    text-shadow:
    0 0 10px #00ffea,
    0 0 20px #00ffea;

    animation:bannerMove 7s linear infinite;

    z-index:20;
}

@keyframes bannerMove{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-115vw);
    }

}

/* WINNER SCREEN */

#winnerPopup{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.8);

    display:none;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    z-index:999;
}

#winnerPopup h1{
    color:white;

    font-size:100px;

    text-shadow:
    0 0 20px gold,
    0 0 40px gold;

    animation:pulse 1s infinite;
}

/* MOBILE */
@media(max-width:768px){

    .container{

        gap:14px;

        padding:12px;

    }

    .title{

        font-size:28px;

        margin-bottom:10px;

    }

    #leaderboard{

        gap:10px;

    }

    .leader{

        width:100%;

        font-size:16px;

        padding:8px 12px;

        border-radius:14px;

    }

    .raceRow{

        gap:8px;

    }

    .giftOutside{

        width:50px;
        height:50px;

        min-width:50px;

        font-size:28px;

        border-radius:14px;

    }

    .track{

        height:72px;

        border-radius:18px;

    }

    .horse{

        top:12px;

    }

    .horse img{

        width:46px;

    }

    .label{

        left:65px;

        font-size:13px;

        letter-spacing:1px;

    }

    .banner{

        font-size:11px;

        top:48px;

    }

    #winnerPopup h1{

        font-size:42px;

        text-align:center;

        padding:20px;

    }

}

</style>
</head>

<body>

<div class="container">

<div class="title">
🏆 CURSA TIKTOK 🏆
</div>
<div id="leaderboard">

    <div class="leader">
         <span id="laps1">Ilie Bolojan - 0 ture</span>
    </div>

    <div class="leader">
         <span id="laps2">Nicușor Dan - 0 ture</span>
    </div>

    <div class="leader">
         <span id="laps3">George Simion - 0 ture</span>
    </div>

    <div class="leader">
         <span id="laps4">Călin Georgescu - 0 ture</span>
    </div>

</div>
<!-- ROMANIA -->

<!-- TRACK 1 -->

<div class="raceRow">

    <div class="giftOutside">
        <img src="gg.webp" class="giftImg">
    </div>

    <div class="track">

        <div class="finish"></div>

        <div class="label">Ilie Bolojan</div>

        <div class="banner">
            Ilie Bolojan
        </div>

        <div class="horse" id="track1Horse">
            <img src="horse.gif">
        </div>

    </div>

</div>

<!-- TRACK 2 -->

<div class="raceRow">

    <div class="giftOutside">
        <img src="rose.webp" class="giftImg">
    </div>

    <div class="track">

        <div class="finish"></div>

        <div class="label">Nicușor Dan</div>

        <div class="banner">
            Nicușor Dan
        </div>

        <div class="horse" id="track2Horse">
            <img src="horse.gif">
        </div>

    </div>

</div>

<!-- TRACK 3 -->

<div class="raceRow">

    <div class="giftOutside">
        <img src="icecream.webp" class="giftImg">
    </div>

    <div class="track">

        <div class="finish"></div>

        <div class="label">George Simion</div>

        <div class="banner">
            George Simion
        </div>

        <div class="horse" id="track3Horse">
            <img src="horse.gif">
        </div>

    </div>

</div>

<!-- TRACK 4 -->

<div class="raceRow">

    <div class="giftOutside">
        <img src="heart.webp" class="giftImg">
    </div>

    <div class="track">

        <div class="finish"></div>

        <div class="label">Călin Georgescu</div>

        <div class="banner">
            Călin Georgescu
        </div>

        <div class="horse" id="track4Horse">
            <img src="horse.gif">
        </div>

    </div>

</div> 
</div>

<!-- WINNER -->

<script>

const socket = io();

const horses = {

    track1:document.getElementById('track1Horse'),
    track2:document.getElementById('track2Horse'),
    track3:document.getElementById('track3Horse'),
    track4:document.getElementById('track4Horse')

};
const scores = {

    track1:0,
    track2:0,
    track3:0,
    track4:0

};
socket.on('updateRace', data => {

horses.track1.style.left = data.track1 + 'px';
horses.track2.style.left = data.track2 + 'px';
horses.track3.style.left = data.track3 + 'px';
horses.track4.style.left = data.track4 + 'px';

    checkWinner(data);

});

function checkWinner(data){

    const trackWidth =
    document.querySelector('.track').offsetWidth;

    const finishLine = trackWidth - 120;

    for(const horse in data){

        if(data[horse] >= finishLine){

            scores[horse]++;

            data[horse] = 0;

            setTimeout(()=>{

    horses[horse].style.left = '10px';

},300);

            updateLeaderboard();

        }

    }

}
function updateLeaderboard(){

    document.getElementById('laps1').innerHTML =
    'Ilie Bolojan - ' + scores.track1 + ' ture';

    document.getElementById('laps2').innerHTML =
    'Nicușor Dan - ' + scores.track2 + ' ture';

    document.getElementById('laps3').innerHTML =
    'George Simion - ' + scores.track3 + ' ture';

    document.getElementById('laps4').innerHTML =
    'Călin Georgescu - ' + scores.track4 + ' ture';

}
</script>

    <script>

function openFullscreen() {

    const elem = document.documentElement;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    }

    else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    }

}

document.body.addEventListener('click', () => {

    openFullscreen();

}, { once:true });

</script>
</body>
</html>
